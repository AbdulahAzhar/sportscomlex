name: Cache Sports API
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  fetch-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Create data directory
        run: mkdir -p data
      - name: Fetch API data
        run: |
          curl -s "https://sportzx.abid58b.workers.dev/" -o data/matches.json
      - name: Check if valid
        run: |
          if [ ! -s data/matches.json ]; then exit 1; fi
          # Validates the new 'results' array structure
          jq '.results | length' data/matches.json
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/matches.json
          git diff --staged --quiet || git commit -m "Update matches $(date +'%Y-%m-%d %H:%M:%S')"
          git push
