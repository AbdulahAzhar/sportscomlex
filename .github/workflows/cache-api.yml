name: Cache Sports API

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [main]  # Run on push to main

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Fetch API data
        run: |
          curl -s "https://sportzx.cc/wp-admin/admin-ajax.php?action=vsc_matches" -o data/matches.json
          echo "Fetched at $(date)"
      
      - name: Validate JSON
        run: |
          if ! jq empty data/matches.json 2>/dev/null; then
            echo "Invalid JSON response"
            exit 1
          fi
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/matches.json
          git diff --staged --quiet || git commit -m "Update matches.json - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
