<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>RAW STREAMS // NEO-BRUTALIST</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.16.3/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.16.3/controls.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;700;900&family=Archivo+Black&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --neon-yellow: #FFFF00;
            --electric-pink: #FF006E;
            --acid-green: #39FF14;
            --harsh-black: #000000;
            --off-white: #F0F0F0;
        }
        
        body {
            font-family: 'Work Sans', sans-serif;
            background-color: var(--off-white);
            background-image: linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px), linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .brutal-border {
            border: 4px solid var(--harsh-black);
            box-shadow: 8px 8px 0px 0px var(--harsh-black);
        }
        
        .brutal-card {
            background: white;
            border: 4px solid var(--harsh-black);
            box-shadow: 10px 10px 0px 0px var(--harsh-black);
            transition: all 0.2s ease;
        }

        .brutal-card:hover {
            transform: translate(-5px, -5px);
            box-shadow: 15px 15px 0px 0px var(--electric-pink);
        }

        .category-badge {
            background: var(--neon-yellow);
            border: 3px solid var(--harsh-black);
            font-family: 'Space Mono', monospace;
            box-shadow: 3px 3px 0px var(--harsh-black);
        }

        #video-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            padding: 20px;
        }

        #video-modal.active { display: flex; }

        .source-btn {
            border: 4px solid black;
            box-shadow: 4px 4px 0px black;
            transition: 0.1s;
        }

        .source-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px black; }
        
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="sticky top-0 z-50 bg-white border-b-4 border-black p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-black italic tracking-tighter">RAW//STREAMS</h1>
            <div class="flex gap-4 items-center">
                <div id="status" class="bg-[#39FF14] border-4 border-black px-3 py-1 font-mono font-bold text-xs">LIVE</div>
                <button onclick="loadData()" class="bg-[#FFFF00] border-4 border-black px-4 py-1 font-bold shadow-[4px_4px_0px_black] hover:shadow-none hover:translate-x-1 hover:translate-y-1">REFRESH</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 mt-10">
        <div id="contentGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>
    </main>

    <div id="video-modal" class="items-center justify-center">
        <div class="bg-white border-8 border-black w-full max-w-5xl shadow-[30px_30px_0px_#FF006E]">
            <div class="bg-[#FFFF00] border-b-4 border-black p-4 flex justify-between items-center">
                <h2 id="modal-title" class="font-black text-xl uppercase">STREAM_VIEW</h2>
                <button onclick="closeModal()" class="bg-black text-white px-4 py-2 font-bold">CLOSE [X]</button>
            </div>
            <div class="p-4">
                <div class="aspect-video bg-black border-4 border-black" data-shaka-player-container>
                    <video data-shaka-player id="video" class="w-full h-full" autoplay></video>
                </div>
                <div id="source-list" class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6"></div>
            </div>
        </div>
    </div>

    <script>
        let matchesData = [];
        let player = null;
        const API_URL = 'data/matches.json';

        async function initPlayer() {
            const video = document.getElementById('video');
            const ui = video['ui'];
            player = ui.getControls().getPlayer();
        }

        document.addEventListener('shaka-ui-loaded', initPlayer);

        async function loadData() {
            try {
                const res = await fetch(API_URL + '?t=' + Date.now());
                const data = await res.json();
                
                // Map the new "results" structure to our UI
                matchesData = data.results.map(item => ({
                    id: item.id,
                    title: item.eventInfo?.eventName || item.title,
                    category: item.cat,
                    image: item.eventInfo?.teamAFlag || item.image,
                    teamA: item.eventInfo?.teamA,
                    teamB: item.eventInfo?.teamB,
                    teamAFlag: item.eventInfo?.teamAFlag,
                    teamBFlag: item.eventInfo?.teamBFlag,
                    time: item.eventInfo?.startTime?.split(' ')[1]?.substring(0,5) || 'LIVE',
                    links: item.channels || []
                }));

                render();
            } catch (e) {
                console.error("Fetch error", e);
            }
        }

        function render() {
            const grid = document.getElementById('contentGrid');
            grid.innerHTML = matchesData.map(m => `
                <div class="brutal-card flex flex-col">
                    <div class="relative h-48 border-b-4 border-black bg-gray-200">
                        <img src="${m.image}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/600x400?text=SPORTS'">
                        <div class="absolute top-2 left-2 category-badge px-2 py-1 text-xs font-bold uppercase">${m.category}</div>
                    </div>
                    <div class="p-5 flex-1 flex flex-col">
                        <h3 class="font-black text-xl mb-4 uppercase line-clamp-2">${m.title}</h3>
                        <div class="bg-gray-100 border-2 border-black p-2 flex justify-between items-center mb-4">
                            <span class="font-bold text-xs">${m.teamA}</span>
                            <span class="text-[#FF006E] font-black italic text-xs">VS</span>
                            <span class="font-bold text-xs">${m.teamB}</span>
                        </div>
                        <button onclick="openStream('${m.id}')" class="mt-auto bg-black text-white font-bold py-3 hover:bg-[#FF006E] transition-all">WATCH NOW →</button>
                    </div>
                </div>
            `).join('');
        }

        async function openStream(id) {
            const match = matchesData.find(m => m.id === id);
            if (!match) return;

            document.getElementById('modal-title').textContent = match.title;
            const sourceList = document.getElementById('source-list');
            
            sourceList.innerHTML = match.links.map((l, i) => `
                <button onclick="playLink('${l.link}', '${l.api || ''}')" class="source-btn bg-white p-2 font-bold text-xs uppercase hover:bg-[#FFFF00]">
                    ${l.title || 'Source ' + (i+1)}
                </button>
            `).join('');

            document.getElementById('video-modal').classList.add('active');
            if (match.links.length > 0) playLink(match.links[0].link, match.links[0].api);
        }

        async function playLink(url, api) {
            if (!player) return;
            try {
                if (api && api.includes(':')) {
                    const [keyId, key] = api.split(':');
                    player.configure({ drm: { clearKeys: { [keyId]: key } } });
                } else {
                    player.configure({ drm: { clearKeys: {} } });
                }
                await player.load(url.split('|')[0]);
            } catch (e) {
                console.error("Load error", e);
            }
        }

        function closeModal() {
            if (player) player.unload();
            document.getElementById('video-modal').classList.remove('active');
        }

        loadData();
    </script>
</body>
</html>
