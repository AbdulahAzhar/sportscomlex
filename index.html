<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>RAW STREAMS // NEO-BRUTALIST</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.16.3/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.16.3/controls.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;700;900&family=Archivo+Black&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --neon-yellow: #FFFF00;
            --electric-pink: #FF006E;
            --acid-green: #39FF14;
            --harsh-black: #000000;
            --off-white: #F0F0F0;
        }
        
        body {
            font-family: 'Work Sans', sans-serif;
            background-color: var(--off-white);
            background-image: linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px), linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .brutal-card {
            background: white;
            border: 4px solid var(--harsh-black);
            box-shadow: 10px 10px 0px 0px var(--harsh-black);
            transition: all 0.2s ease;
        }

        .brutal-card:hover {
            transform: translate(-5px, -5px);
            box-shadow: 15px 15px 0px 0px var(--electric-pink);
        }

        .filter-btn {
            border: 3px solid black;
            box-shadow: 4px 4px 0px black;
            font-family: 'Space Mono', monospace;
            transition: 0.1s;
        }

        .filter-btn.active {
            background: black !important;
            color: white !important;
            box-shadow: 0px 0px 0px black;
            transform: translate(4px, 4px);
        }

        #video-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            padding: 20px;
        }

        #video-modal.active { display: flex; }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="sticky top-0 z-50 bg-white border-b-4 border-black p-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-4xl font-black italic tracking-tighter uppercase">RAW//STREAMS</h1>
            
            <div class="flex gap-2 flex-wrap justify-center" id="timeFilters">
                <button onclick="setTimeFilter('all')" class="filter-btn active bg-white px-3 py-1 text-xs font-bold" data-time="all">ALL</button>
                <button onclick="setTimeFilter('live')" class="filter-btn bg-[#39FF14] px-3 py-1 text-xs font-bold" data-time="live">LIVE NOW</button>
                <button onclick="setTimeFilter('today')" class="filter-btn bg-[#FFFF00] px-3 py-1 text-xs font-bold" data-time="today">TODAY</button>
                <button onclick="setTimeFilter('upcoming')" class="filter-btn bg-[#00FFFF] px-3 py-1 text-xs font-bold" data-time="upcoming">UPCOMING</button>
            </div>
        </div>
    </header>

    <nav class="bg-black text-white p-3 border-b-4 border-black overflow-x-auto whitespace-nowrap">
        <div class="max-w-7xl mx-auto flex gap-6 px-4 font-mono text-xs font-bold uppercase tracking-widest" id="sportFilters">
            <span onclick="setSportFilter('all')" class="cursor-pointer hover:text-[#FFFF00] text-[#FFFF00]" data-sport="all">[ ALL_SPORTS ]</span>
            </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 mt-8">
        <div id="contentGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>
    </main>

    <div id="video-modal" class="items-center justify-center">
        <div class="bg-white border-8 border-black w-full max-w-5xl">
            <div class="bg-[#FF006E] text-white border-b-4 border-black p-4 flex justify-between items-center">
                <h2 id="modal-title" class="font-black text-xl uppercase italic">BUFFERING_SIGNAL...</h2>
                <button onclick="closeModal()" class="bg-black text-white px-4 py-2 font-bold border-2 border-white">EXIT [X]</button>
            </div>
            <div class="p-4 bg-black">
                <div class="aspect-video bg-black" data-shaka-player-container>
                    <video data-shaka-player id="video" class="w-full h-full" autoplay></video>
                </div>
                <div id="source-list" class="grid grid-cols-2 md:grid-cols-4 gap-2 mt-4"></div>
            </div>
        </div>
    </div>

    <script>
        let matchesData = [];
        let player = null;
        let currentSport = 'all';
        let currentTime = 'all';

        async function initPlayer() {
            const video = document.getElementById('video');
            const ui = video['ui'];
            player = ui.getControls().getPlayer();
        }
        document.addEventListener('shaka-ui-loaded', initPlayer);

        async function loadData() {
            try {
                const res = await fetch('data/matches.json?t=' + Date.now());
                const data = await res.json();
                
                matchesData = data.results.map(item => {
                    const startStr = item.eventInfo?.startTime || ""; // "YYYY/MM/DD HH:MM:SS"
                    const startTime = new Date(startStr.replace(/\//g, '-'));
                    const endTime = item.eventInfo?.endTime ? new Date(item.eventInfo.endTime.replace(/\//g, '-')) : new Date(startTime.getTime() + 7200000);
                    
                    return {
                        id: item.id,
                        title: item.eventInfo?.eventName || item.title,
                        category: item.cat || "Other",
                        image: item.eventInfo?.teamAFlag || item.image,
                        teamA: item.eventInfo?.teamA,
                        teamB: item.eventInfo?.teamB,
                        teamAFlag: item.eventInfo?.teamAFlag,
                        teamBFlag: item.eventInfo?.teamBFlag,
                        startTime: startTime,
                        endTime: endTime,
                        isLive: new Date() >= startTime && new Date() <= endTime,
                        isToday: new Date().toDateString() === startTime.toDateString(),
                        links: item.channels || []
                    };
                });

                renderSportsFilters();
                render();
            } catch (e) { console.error("API Error", e); }
        }

        function renderSportsFilters() {
            const container = document.getElementById('sportFilters');
            const categories = ['all', ...new Set(matchesData.map(m => m.category))];
            container.innerHTML = categories.map(cat => `
                <span onclick="setSportFilter('${cat}')" 
                      class="cursor-pointer hover:text-[#FFFF00] ${currentSport === cat ? 'text-[#FFFF00]' : ''}" 
                      data-sport="${cat}">
                    [ ${cat.replace(/\s+/g, '_').toUpperCase()} ]
                </span>
            `).join('');
        }

        function setSportFilter(sport) {
            currentSport = sport;
            render();
            renderSportsFilters();
        }

        function setTimeFilter(time) {
            currentTime = time;
            document.querySelectorAll('#timeFilters button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.time === time);
            });
            render();
        }

        function render() {
            const grid = document.getElementById('contentGrid');
            const now = new Date();

            let filtered = matchesData.filter(m => {
                const sportMatch = currentSport === 'all' || m.category === currentSport;
                let timeMatch = true;
                if (currentTime === 'live') timeMatch = m.isLive;
                if (currentTime === 'today') timeMatch = m.isToday;
                if (currentTime === 'upcoming') timeMatch = m.startTime > now;
                return sportMatch && timeMatch;
            });

            grid.innerHTML = filtered.map(m => `
                <div class="brutal-card flex flex-col">
                    <div class="relative h-48 border-b-4 border-black bg-black overflow-hidden">
                        <img src="${m.image}" class="w-full h-full object-cover opacity-80" onerror="this.src='https://placehold.co/600x400?text=SPORTS'">
                        <div class="absolute top-2 left-2 bg-[#FFFF00] border-2 border-black px-2 py-1 text-[10px] font-black uppercase">${m.category}</div>
                        ${m.isLive ? '<div class="absolute top-2 right-2 bg-[#FF006E] text-white border-2 border-black px-2 py-1 text-[10px] font-black animate-pulse">LIVE</div>' : ''}
                    </div>
                    <div class="p-5 flex-1 flex flex-col">
                        <h3 class="font-black text-xl mb-2 uppercase line-clamp-2 italic">${m.title}</h3>
                        <div class="flex items-center justify-between mb-4 bg-gray-50 border-2 border-black p-2">
                             <img src="${m.teamAFlag}" class="w-6 h-6 border border-black bg-white" onerror="this.style.display='none'">
                             <span class="text-[10px] font-bold">VS</span>
                             <img src="${m.teamBFlag}" class="w-6 h-6 border border-black bg-white" onerror="this.style.display='none'">
                        </div>
                        <div class="font-mono text-[10px] mb-4 bg-black text-white p-1 text-center">
                            START: ${m.startTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                        </div>
                        <button onclick="openStream('${m.id}')" class="mt-auto bg-black text-white font-bold py-3 hover:bg-[#39FF14] hover:text-black transition-all border-t-2 border-black">OPEN_STREAM_PIPE_→</button>
                    </div>
                </div>
            `).join('');
        }

        async function openStream(id) {
            const match = matchesData.find(m => m.id === id);
            if (!match) return;
            document.getElementById('modal-title').textContent = `SIGNAL: ${match.title}`;
            const sourceList = document.getElementById('source-list');
            sourceList.innerHTML = match.links.map((l, i) => `
                <button onclick="playLink('${l.link}', '${l.api || ''}')" class="bg-white border-2 border-black p-2 font-bold text-[10px] uppercase hover:bg-[#FFFF00]">
                    FEED_${String(i+1).padStart(2, '0')} [${l.title.substring(0,6)}]
                </button>
            `).join('');
            document.getElementById('video-modal').classList.add('active');
            if (match.links.length > 0) playLink(match.links[0].link, match.links[0].api);
        }

        async function playLink(url, api) {
            if (!player) return;
            try {
                if (api && api.includes(':')) {
                    const [keyId, key] = api.split(':');
                    player.configure({ drm: { clearKeys: { [keyId]: key } } });
                } else { player.configure({ drm: { clearKeys: {} } }); }
                await player.load(url.split('|')[0]);
            } catch (e) { console.error("Load failed", e); }
        }

        function closeModal() {
            if (player) player.unload();
            document.getElementById('video-modal').classList.remove('active');
        }

        loadData();
        setInterval(loadData, 60000); // Auto refresh every minute
    </script>
</body>
</html>
