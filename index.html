<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>RAW STREAMS // NEO-BRUTALIST</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.16.3/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.16.3/controls.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;700;900&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --neon-yellow: #FFFF00;
            --electric-pink: #FF006E;
            --acid-green: #39FF14;
            --harsh-black: #000000;
            --off-white: #F0F0F0;
        }
        
        body {
            font-family: 'Work Sans', sans-serif;
            background-color: var(--off-white);
            background-image: linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px), linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .brutal-card {
            background: white;
            border: 4px solid var(--harsh-black);
            box-shadow: 10px 10px 0px 0px var(--harsh-black);
        }

        .filter-btn {
            border: 3px solid black;
            box-shadow: 4px 4px 0px black;
            font-family: 'Space Mono', monospace;
            transition: 0.1s;
        }

        .filter-btn.active {
            background: black !important;
            color: white !important;
            box-shadow: 0px 0px 0px black;
            transform: translate(4px, 4px);
        }

        /* MODAL LAYER */
        #video-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            padding: 15px;
            overflow-y: auto;
            align-items: center;
            justify-content: center;
        }

        #video-modal.active { display: flex; }

        .modal-container {
            background: white;
            border: 6px solid black;
            width: 100%;
            max-width: 650px; /* Made player container smaller */
            position: relative;
            box-shadow: 15px 15px 0px var(--electric-pink);
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .close-btn {
            position: absolute;
            top: -20px;
            right: -20px;
            background: var(--harsh-black);
            color: white;
            border: 4px solid var(--electric-pink);
            width: 40px;
            height: 40px;
            font-weight: 900;
            font-size: 20px;
            cursor: pointer;
            z-index: 10001;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-viewport {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-bottom: 4px solid black;
            flex-shrink: 0;
        }

        /* SCROLLABLE LINKS SECTION */
        .links-section {
            padding: 15px;
            background: white;
            overflow-y: auto;
            height: 140px; /* Fixed height to show roughly two rows */
        }

        .links-section::-webkit-scrollbar {
            width: 10px;
        }
        .links-section::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-left: 3px solid black;
        }
        .links-section::-webkit-scrollbar-thumb {
            background: black;
            border: 2px solid white;
        }

        .feed-btn {
            border: 3px solid black;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            text-align: left;
            transition: 0.2s;
            background: white;
            padding: 10px;
        }

        .feed-btn.active-link {
            background: var(--acid-green) !important;
            box-shadow: inset 4px 4px 0px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="sticky top-0 z-50 bg-white border-b-4 border-black p-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-4xl font-black tracking-tighter uppercase italic">RAW//STREAMS</h1>
            <div class="flex gap-2" id="timeFilters">
                <button onclick="setTimeFilter('all')" class="filter-btn active bg-white px-4 py-1 text-xs font-bold" data-time="all">ALL</button>
                <button onclick="setTimeFilter('live')" class="filter-btn bg-[#39FF14] px-4 py-1 text-xs font-bold" data-time="live">LIVE</button>
            </div>
        </div>
    </header>

    <nav class="bg-black text-white p-3 border-b-4 border-black overflow-x-auto">
        <div class="max-w-7xl mx-auto flex gap-6 px-4 font-mono text-[10px] font-bold uppercase tracking-widest" id="sportFilters">
            <span onclick="setSportFilter('all')" class="cursor-pointer text-[#FFFF00]">[ ALL_SPORTS ]</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 mt-8">
        <div id="contentGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <div id="video-modal">
        <div class="modal-container">
            <button onclick="closeModal()" class="close-btn">✕</button>
            
            <div class="bg-black p-2 text-white font-mono text-[10px] flex justify-between items-center border-b-4 border-black flex-shrink-0">
                <div class="flex items-center gap-3">
                    <span id="modal-title" class="font-bold text-xs italic uppercase tracking-tighter truncate max-w-[200px]">SIGNAL_LOAD</span>
                    <span id="modal-cat" class="bg-[#FFFF00] text-black px-1.5 py-0.5 font-black text-[9px]">CAT</span>
                </div>
                <span class="text-[#39FF14] text-[9px]">● LIVE_FEED</span>
            </div>

            <div class="video-viewport" data-shaka-player-container>
                <video data-shaka-player id="video" autoplay></video>
            </div>

            <div class="links-section">
                <p class="font-black text-[10px] uppercase mb-3 border-l-4 border-[#FF006E] pl-2">Signal Sources:</p>
                <div id="source-list" class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                    </div>
            </div>
        </div>
    </div>

    <script>
        let matchesData = [];
        let player = null;
        let currentSport = 'all';
        let currentTime = 'all';

        async function initPlayer() {
            const video = document.getElementById('video');
            const ui = video['ui'];
            player = ui.getControls().getPlayer();
        }
        document.addEventListener('shaka-ui-loaded', initPlayer);

        async function loadData() {
            try {
                const res = await fetch('data/matches.json?t=' + Date.now());
                const data = await res.json();
                
                matchesData = data.results.map(item => ({
                    ...item,
                    id: item.id,
                    displayTitle: item.eventInfo?.eventName || item.title,
                    isLive: new Date() >= new Date(item.eventInfo?.startTime.replace(/\//g, '-')) && 
                            new Date() <= (item.eventInfo?.endTime ? new Date(item.eventInfo.endTime.replace(/\//g, '-')) : new Date())
                }));

                renderSportsFilters();
                render();
            } catch (e) { console.error(e); }
        }

        function renderSportsFilters() {
            const container = document.getElementById('sportFilters');
            const categories = ['all', ...new Set(matchesData.map(m => m.cat))];
            container.innerHTML = categories.map(cat => `
                <span onclick="setSportFilter('${cat}')" 
                      class="cursor-pointer hover:text-[#FFFF00] ${currentSport === cat ? 'text-[#FFFF00]' : ''}">
                    [ ${cat.toUpperCase()} ]
                </span>
            `).join('');
        }

        function setSportFilter(s) { currentSport = s; render(); renderSportsFilters(); }
        function setTimeFilter(t) { 
            currentTime = t; 
            document.querySelectorAll('#timeFilters button').forEach(b => b.classList.toggle('active', b.dataset.time === t));
            render(); 
        }

        function render() {
            const grid = document.getElementById('contentGrid');
            const filtered = matchesData.filter(m => {
                const sMatch = currentSport === 'all' || m.cat === currentSport;
                const tMatch = currentTime === 'all' || (currentTime === 'live' && m.isLive);
                return sMatch && tMatch;
            });

            grid.innerHTML = filtered.map(m => `
                <div class="brutal-card flex flex-col">
                    <div class="h-44 bg-black relative border-b-4 border-black overflow-hidden">
                        <img src="${m.eventInfo?.teamAFlag || m.image}" class="w-full h-full object-cover opacity-80">
                        <div class="absolute top-2 left-2 bg-[#FFFF00] border-2 border-black px-2 py-1 text-[9px] font-black uppercase">${m.cat}</div>
                        ${m.isLive ? '<div class="absolute top-2 right-2 bg-[#FF006E] text-white border-2 border-black px-2 py-0.5 text-[9px] font-black animate-pulse">LIVE</div>' : ''}
                    </div>
                    <div class="p-5 flex-1 flex flex-col">
                        <h3 class="font-black text-xl mb-4 leading-tight uppercase italic line-clamp-2">${m.displayTitle}</h3>
                        <button onclick="openStream('${m.id}')" class="mt-auto bg-black text-white font-bold py-3 hover:bg-[#39FF14] hover:text-black border-2 border-black shadow-[6px_6px_0px_black] active:shadow-none transition-all">ACCESS_SYSTEM →</button>
                    </div>
                </div>
            `).join('');
        }

        function openStream(id) {
            const match = matchesData.find(m => m.id === id);
            if (!match) return;
            
            document.getElementById('modal-title').textContent = match.displayTitle.toUpperCase();
            document.getElementById('modal-cat').textContent = match.cat.toUpperCase();
            
            const sourceList = document.getElementById('source-list');
            sourceList.innerHTML = match.channels.map((ch, i) => `
                <button id="feed-${i}" onclick="playLink('${ch.link}', '${ch.api || ''}', ${i})" 
                        class="feed-btn flex flex-col gap-0.5 border-2 border-black hover:border-[#FF006E]">
                    <span class="font-black text-[10px] uppercase truncate">${ch.title}</span>
                    <span class="text-[7px] opacity-60">LINK_SIGNAL_0${i+1}</span>
                </button>
            `).join('');

            document.getElementById('video-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
            if (match.channels.length > 0) playLink(match.channels[0].link, match.channels[0].api, 0);
        }

        async function playLink(url, api, index) {
            if (!player) return;
            document.querySelectorAll('.feed-btn').forEach(b => b.classList.remove('active-link'));
            const btn = document.getElementById(`feed-${index}`);
            if (btn) btn.classList.add('active-link');

            try {
                if (api && api.includes(':')) {
                    const [kId, k] = api.split(':');
                    player.configure({ drm: { clearKeys: { [kId]: k } } });
                } else { player.configure({ drm: { clearKeys: {} } }); }
                await player.load(url.split('|')[0]);
            } catch (e) { console.error(e); }
        }

        function closeModal() {
            if (player) player.unload();
            document.getElementById('video-modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        loadData();
    </script>
</body>
</html>
