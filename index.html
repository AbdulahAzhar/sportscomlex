<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>RAW STREAMS // NEO-BRUTALIST</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.16.3/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.16.3/controls.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;700;900&family=Archivo+Black&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --neon-yellow: #FFFF00;
            --electric-pink: #FF006E;
            --acid-green: #39FF14;
            --harsh-black: #000000;
            --off-white: #F0F0F0;
        }
        
        body {
            font-family: 'Work Sans', sans-serif;
            background-color: var(--off-white);
            background-image: linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px), linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .brutal-card {
            background: white;
            border: 4px solid var(--harsh-black);
            box-shadow: 10px 10px 0px 0px var(--harsh-black);
            transition: all 0.15s ease;
        }

        .brutal-card:hover {
            transform: translate(-5px, -5px);
            box-shadow: 15px 15px 0px 0px var(--electric-pink);
        }

        .filter-btn {
            border: 3px solid black;
            box-shadow: 4px 4px 0px black;
            font-family: 'Space Mono', monospace;
            transition: 0.1s;
        }

        .filter-btn.active {
            background: black !important;
            color: white !important;
            box-shadow: 0px 0px 0px black;
            transform: translate(4px, 4px);
        }

        /* MODAL & PLAYER FIXES */
        #video-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            padding: 15px;
            overflow-y: auto;
            align-items: center;
            justify-content: center;
        }

        #video-modal.active { display: flex; }

        .modal-container {
            background: white;
            border: 6px solid black;
            width: 100%;
            max-width: 1000px;
            position: relative;
            box-shadow: 20px 20px 0px var(--harsh-black);
        }

        .close-x {
            position: absolute;
            top: -25px;
            right: -25px;
            background: var(--electric-pink);
            color: white;
            border: 4px solid black;
            width: 50px;
            height: 50px;
            font-weight: 900;
            font-size: 24px;
            cursor: pointer;
            z-index: 10001;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-viewport {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-bottom: 4px solid black;
        }

        .source-pill {
            border: 3px solid black;
            font-family: 'Space Mono', monospace;
            font-weight: bold;
            font-size: 11px;
            transition: 0.2s;
        }

        .source-pill.active-link {
            background: var(--acid-green) !important;
            box-shadow: inset 4px 4px 0px rgba(0,0,0,0.2);
            transform: scale(0.98);
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="sticky top-0 z-50 bg-white border-b-4 border-black p-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-4xl font-black italic tracking-tighter uppercase">RAW//STREAMS</h1>
            
            <div class="flex gap-2 flex-wrap justify-center" id="timeFilters">
                <button onclick="setTimeFilter('all')" class="filter-btn active bg-white px-4 py-1 text-xs font-bold" data-time="all">ALL_EVENTS</button>
                <button onclick="setTimeFilter('live')" class="filter-btn bg-[#39FF14] px-4 py-1 text-xs font-bold" data-time="live">LIVE_NOW</button>
                <button onclick="setTimeFilter('today')" class="filter-btn bg-[#FFFF00] px-4 py-1 text-xs font-bold" data-time="today">TODAY</button>
                <button onclick="setTimeFilter('upcoming')" class="filter-btn bg-[#00FFFF] px-4 py-1 text-xs font-bold" data-time="upcoming">UPCOMING</button>
            </div>
        </div>
    </header>

    <nav class="bg-black text-white p-3 border-b-4 border-black overflow-x-auto">
        <div class="max-w-7xl mx-auto flex gap-6 px-4 font-mono text-[10px] font-bold uppercase tracking-widest" id="sportFilters">
            <span onclick="setSportFilter('all')" class="cursor-pointer text-[#FFFF00]" data-sport="all">[ ALL_SPORTS ]</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 mt-8">
        <div id="contentGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>
    </main>

    <div id="video-modal">
        <div class="modal-container">
            <button onclick="closeModal()" class="close-x">✕</button>
            
            <div class="bg-black p-3 text-white font-mono text-[10px] flex justify-between border-b-4 border-black">
                <span id="modal-title">STREAMING_ID: NULL</span>
                <span class="text-[#39FF14] animate-pulse">● SIGNAL_CONNECTED</span>
            </div>

            <div class="video-viewport" data-shaka-player-container>
                <video data-shaka-player id="video" class="w-full h-full" autoplay></video>
            </div>

            <div class="p-5 bg-gray-50">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-black text-xs uppercase italic">Select Signal Feed:</span>
                    <span id="current-feed-name" class="font-mono text-[10px] bg-black text-white px-2 py-0.5">FEED_01</span>
                </div>
                <div id="source-list" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
            </div>
        </div>
    </div>

    <script>
        let matchesData = [];
        let player = null;
        let currentSport = 'all';
        let currentTime = 'all';

        async function initPlayer() {
            const video = document.getElementById('video');
            const ui = video['ui'];
            player = ui.getControls().getPlayer();
        }
        document.addEventListener('shaka-ui-loaded', initPlayer);

        async function loadData() {
            try {
                const res = await fetch('data/matches.json?t=' + Date.now());
                const data = await res.json();
                
                // EXTRACT DATA AS IS: Mapping from your specific JSON structure
                matchesData = data.results.map(item => {
                    const startStr = item.eventInfo?.startTime || "";
                    const startTime = new Date(startStr.replace(/\//g, '-'));
                    const endTimeStr = item.eventInfo?.endTime || "";
                    const endTime = endTimeStr ? new Date(endTimeStr.replace(/\//g, '-')) : new Date(startTime.getTime() + 7200000);
                    
                    const now = new Date();
                    return {
                        id: item.id,
                        title: item.eventInfo?.eventName || item.title,
                        cat: item.cat || "Other",
                        image: item.eventInfo?.teamAFlag || item.image,
                        teamA: item.eventInfo?.teamA,
                        teamB: item.eventInfo?.teamB,
                        teamAFlag: item.eventInfo?.teamAFlag,
                        teamBFlag: item.eventInfo?.teamBFlag,
                        startTime: startTime,
                        isLive: now >= startTime && now <= endTime,
                        isToday: now.toDateString() === startTime.toDateString(),
                        isUpcoming: startTime > now,
                        links: item.channels || []
                    };
                });

                renderSportsFilters();
                render();
            } catch (e) { console.error("Data Load Error", e); }
        }

        function renderSportsFilters() {
            const container = document.getElementById('sportFilters');
            const categories = ['all', ...new Set(matchesData.map(m => m.cat))];
            container.innerHTML = categories.map(cat => `
                <span onclick="setSportFilter('${cat}')" 
                      class="cursor-pointer hover:text-[#FFFF00] ${currentSport === cat ? 'text-[#FFFF00]' : ''}">
                    [ ${cat.toUpperCase().replace(/\s+/g, '_')} ]
                </span>
            `).join('');
        }

        function setSportFilter(s) { currentSport = s; render(); renderSportsFilters(); }
        function setTimeFilter(t) { 
            currentTime = t; 
            document.querySelectorAll('#timeFilters button').forEach(b => b.classList.toggle('active', b.dataset.time === t));
            render(); 
        }

        function render() {
            const grid = document.getElementById('contentGrid');
            const filtered = matchesData.filter(m => {
                const sMatch = currentSport === 'all' || m.cat === currentSport;
                let tMatch = true;
                if (currentTime === 'live') tMatch = m.isLive;
                if (currentTime === 'today') tMatch = m.isToday;
                if (currentTime === 'upcoming') tMatch = m.isUpcoming;
                return sMatch && tMatch;
            });

            grid.innerHTML = filtered.map(m => `
                <div class="brutal-card flex flex-col h-full">
                    <div class="relative h-44 bg-black overflow-hidden border-b-4 border-black">
                        <img src="${m.image}" class="w-full h-full object-cover opacity-80" onerror="this.src='https://placehold.co/400x200?text=SIGNAL_LOSS'">
                        <div class="absolute top-2 left-2 bg-[#FFFF00] border-2 border-black px-2 py-1 text-[9px] font-black uppercase tracking-tighter">${m.cat}</div>
                        ${m.isLive ? '<div class="absolute top-2 right-2 bg-[#FF006E] text-white border-2 border-black px-2 py-1 text-[9px] font-black animate-pulse">● LIVE</div>' : ''}
                    </div>
                    <div class="p-5 flex-1 flex flex-col">
                        <h3 class="font-black text-xl mb-3 leading-tight uppercase italic line-clamp-2">${m.title}</h3>
                        
                        <div class="flex items-center justify-between mb-4 bg-gray-50 border-2 border-black p-2">
                            <div class="flex flex-col items-center flex-1">
                                <img src="${m.teamAFlag}" class="w-8 h-8 object-contain mb-1" onerror="this.style.display='none'">
                                <span class="text-[9px] font-bold text-center uppercase">${m.teamA || ''}</span>
                            </div>
                            <span class="text-[#FF006E] font-black italic text-xs mx-2">VS</span>
                            <div class="flex flex-col items-center flex-1">
                                <img src="${m.teamBFlag}" class="w-8 h-8 object-contain mb-1" onerror="this.style.display='none'">
                                <span class="text-[9px] font-bold text-center uppercase">${m.teamB || ''}</span>
                            </div>
                        </div>

                        <div class="mt-auto pt-4 border-t-2 border-dashed border-black flex items-center justify-between">
                            <div class="font-mono text-[10px] font-bold">
                                START: ${m.startTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                            </div>
                            <button onclick="openStream('${m.id}')" class="bg-black text-white font-black px-4 py-2 hover:bg-[#39FF14] hover:text-black border-2 border-black shadow-[4px_4px_0px_black] active:shadow-none active:translate-x-1 active:translate-y-1 transition-all text-xs">
                                ACCESS_STREAM →
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openStream(id) {
            const match = matchesData.find(m => m.id === id);
            if (!match || match.links.length === 0) return;
            
            document.getElementById('modal-title').textContent = `SIGNAL_ID: ${match.title}`;
            const sourceList = document.getElementById('source-list');
            
            sourceList.innerHTML = match.links.map((l, i) => `
                <button id="feed-${i}" onclick="playLink('${l.link}', '${l.api || ''}', ${i}, '${l.title}')" 
                        class="source-pill bg-white p-3 uppercase hover:bg-[#FFFF00] text-center">
                    FEED_${String(i+1).padStart(2, '0')}
                </button>
            `).join('');

            document.getElementById('video-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
            playLink(match.links[0].link, match.links[0].api, 0, match.links[0].title);
        }

        async function playLink(url, api, index, title) {
            if (!player) return;
            
            document.querySelectorAll('.source-pill').forEach(b => b.classList.remove('active-link'));
            const activeBtn = document.getElementById(`feed-${index}`);
            if (activeBtn) activeBtn.classList.add('active-link');
            document.getElementById('current-feed-name').textContent = title || `FEED_${index+1}`;

            try {
                if (api && api.includes(':')) {
                    const [kId, k] = api.split(':');
                    player.configure({ drm: { clearKeys: { [kId]: k } } });
                } else { player.configure({ drm: { clearKeys: {} } }); }
                
                await player.load(url.split('|')[0]);
            } catch (e) { console.error("Stream Load Error", e); }
        }

        function closeModal() {
            if (player) player.unload();
            document.getElementById('video-modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        loadData();
    </script>
</body>
</html>
