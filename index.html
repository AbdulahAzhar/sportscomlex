<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>RAW STREAMS // NEO-BRUTALIST</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.16.3/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.16.3/controls.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --neon-yellow: #FFFF00;
            --electric-pink: #FF006E;
            --acid-green: #39FF14;
            --harsh-black: #000000;
            --off-white: #F0F0F0;
        }
        
        body {
            font-family: 'Work Sans', sans-serif;
            background-color: var(--off-white);
            background-image: linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px), linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .brutal-card {
            background: white;
            border: 4px solid var(--harsh-black);
            box-shadow: 10px 10px 0px 0px var(--harsh-black);
        }

        .filter-btn {
            border: 3px solid black;
            box-shadow: 4px 4px 0px black;
            transition: 0.1s;
        }

        .filter-btn.active {
            background: black !important;
            color: white !important;
            box-shadow: 0px 0px 0px black;
            transform: translate(4px, 4px);
        }

        /* MODAL FIXES */
        #video-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 9999; /* Higher than Shaka UI */
            padding: 10px;
            overflow-y: auto;
        }

        #video-modal.active { display: flex; align-items: center; justify-content: center; }

        .modal-container {
            background: white;
            border: 6px solid black;
            width: 100%;
            max-width: 1000px;
            position: relative;
            box-shadow: 15px 15px 0px var(--electric-pink);
        }

        /* Close Button Fix */
        .close-modal-btn {
            position: absolute;
            top: -20px;
            right: -20px;
            background: var(--electric-pink);
            color: white;
            border: 4px solid black;
            width: 50px;
            height: 50px;
            font-weight: 900;
            font-size: 24px;
            z-index: 10001;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-modal-btn:hover { background: black; }

        .source-btn {
            border: 3px solid black;
            font-family: 'Space Mono', monospace;
            font-weight: bold;
            transition: 0.2s;
        }

        .source-btn.playing {
            background: var(--acid-green) !important;
            border-color: black;
            box-shadow: inset 4px 4px 0px rgba(0,0,0,0.2);
        }

        /* Responsive Video */
        .video-wrapper {
            width: 100%;
            background: black;
            aspect-ratio: 16 / 9;
            border-bottom: 4px solid black;
        }

        video { width: 100%; height: 100%; }

        .shaka-video-container { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="sticky top-0 z-50 bg-white border-b-4 border-black p-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase">RAW//STREAMS</h1>
            
            <div class="flex gap-2 flex-wrap justify-center" id="timeFilters">
                <button onclick="setTimeFilter('all')" class="filter-btn active bg-white px-3 py-1 text-xs font-bold" data-time="all">ALL</button>
                <button onclick="setTimeFilter('live')" class="filter-btn bg-[#39FF14] px-3 py-1 text-xs font-bold" data-time="live">LIVE</button>
                <button onclick="setTimeFilter('today')" class="filter-btn bg-[#FFFF00] px-3 py-1 text-xs font-bold" data-time="today">TODAY</button>
            </div>
        </div>
    </header>

    <nav class="bg-black text-white p-3 border-b-4 border-black overflow-x-auto whitespace-nowrap">
        <div class="max-w-7xl mx-auto flex gap-6 px-4 font-mono text-[10px] font-bold uppercase" id="sportFilters">
            <span onclick="setSportFilter('all')" class="cursor-pointer text-[#FFFF00]" data-sport="all">[ ALL_SPORTS ]</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 mt-8">
        <div id="contentGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <div id="video-modal">
        <div class="modal-container">
            <button onclick="closeModal()" class="close-modal-btn" title="Close Player">✕</button>
            
            <div class="bg-black p-2 text-white font-mono text-[10px] flex justify-between border-b-2 border-black">
                <span id="modal-title">STREAMPING_ID: NULL</span>
                <span id="playing-status" class="text-[#39FF14]">● SIGNAL_OK</span>
            </div>

            <div class="video-wrapper" data-shaka-player-container>
                <video data-shaka-player id="video" autoplay></video>
            </div>

            <div class="p-4 bg-gray-100">
                <p class="font-bold text-[10px] mb-3 uppercase tracking-widest text-gray-500">Available Feed Links:</p>
                <div id="source-list" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
            </div>
        </div>
    </div>

    <script>
        let matchesData = [];
        let player = null;
        let currentSport = 'all';
        let currentTime = 'all';
        let activeLink = '';

        async function initPlayer() {
            const video = document.getElementById('video');
            const ui = video['ui'];
            player = ui.getControls().getPlayer();
        }
        document.addEventListener('shaka-ui-loaded', initPlayer);

        async function loadData() {
            try {
                const res = await fetch('data/matches.json?t=' + Date.now());
                const data = await res.json();
                
                matchesData = data.results.map(item => {
                    const startStr = item.eventInfo?.startTime || "";
                    const startTime = new Date(startStr.replace(/\//g, '-'));
                    return {
                        id: item.id,
                        title: item.eventInfo?.eventName || item.title,
                        category: item.cat || "Other",
                        image: item.eventInfo?.teamAFlag || item.image,
                        isLive: new Date() >= startTime,
                        links: item.channels || []
                    };
                });
                renderSportsFilters();
                render();
            } catch (e) { console.error(e); }
        }

        function renderSportsFilters() {
            const container = document.getElementById('sportFilters');
            const categories = ['all', ...new Set(matchesData.map(m => m.category))];
            container.innerHTML = categories.map(cat => `
                <span onclick="setSportFilter('${cat}')" 
                      class="cursor-pointer hover:text-[#FFFF00] ${currentSport === cat ? 'text-[#FFFF00]' : ''}">
                    [ ${cat.toUpperCase()} ]
                </span>
            `).join('');
        }

        function setSportFilter(s) { currentSport = s; render(); renderSportsFilters(); }
        function setTimeFilter(t) { 
            currentTime = t; 
            document.querySelectorAll('#timeFilters button').forEach(b => b.classList.toggle('active', b.dataset.time === t));
            render(); 
        }

        function render() {
            const grid = document.getElementById('contentGrid');
            const filtered = matchesData.filter(m => {
                const sMatch = currentSport === 'all' || m.category === currentSport;
                const tMatch = currentTime === 'all' || (currentTime === 'live' && m.isLive);
                return sMatch && tMatch;
            });

            grid.innerHTML = filtered.map(m => `
                <div class="brutal-card flex flex-col">
                    <div class="h-40 bg-black overflow-hidden relative border-b-4 border-black">
                        <img src="${m.image}" class="w-full h-full object-cover opacity-70">
                        <div class="absolute top-2 left-2 bg-[#FFFF00] border-2 border-black px-2 py-0.5 text-[10px] font-black">${m.category}</div>
                    </div>
                    <div class="p-4 flex-1 flex flex-col">
                        <h3 class="font-black text-lg leading-tight mb-4 uppercase italic">${m.title}</h3>
                        <button onclick="openStream('${m.id}')" class="mt-auto bg-black text-white font-bold py-3 hover:bg-[#39FF14] hover:text-black border-2 border-black shadow-[4px_4px_0px_black]">WATCH_STREAM</button>
                    </div>
                </div>
            `).join('');
        }

        function openStream(id) {
            const match = matchesData.find(m => m.id === id);
            if (!match) return;
            
            document.getElementById('modal-title').textContent = `LIVE_FEED // ${match.title}`;
            const sourceList = document.getElementById('source-list');
            
            sourceList.innerHTML = match.links.map((l, i) => `
                <button id="btn-${i}" onclick="playLink('${l.link}', '${l.api || ''}', ${i})" 
                        class="source-btn bg-white p-2 text-[10px] uppercase hover:bg-[#FFFF00]">
                    LINK_${String(i+1).padStart(2, '0')}
                </button>
            `).join('');

            document.getElementById('video-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
            if (match.links.length > 0) playLink(match.links[0].link, match.links[0].api, 0);
        }

        async function playLink(url, api, index) {
            if (!player) return;
            
            // UI Update for Active Link
            document.querySelectorAll('.source-btn').forEach(btn => btn.classList.remove('playing'));
            const activeBtn = document.getElementById(`btn-${index}`);
            if (activeBtn) activeBtn.classList.add('playing');

            try {
                if (api && api.includes(':')) {
                    const [kId, k] = api.split(':');
                    player.configure({ drm: { clearKeys: { [kId]: k } } });
                } else { player.configure({ drm: { clearKeys: {} } }); }
                await player.load(url.split('|')[0]);
            } catch (e) { console.error(e); }
        }

        function closeModal() {
            if (player) player.unload();
            document.getElementById('video-modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        loadData();
    </script>
</body>
</html>
